<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 06 - Galeria Responsiva</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Div que centraliza todas as galerias -->
    <div class="gallery-container">
        <h1>Galeria de Viagens</h1>
        <!-- Grid da galeria -->
        <!-- container flex que usa o flex-wrapper para criar um grid responsiva -->
         <!-- usando flexbox -->
        <div class="grid">

            <!-- Item 1 -->
            <div class="item">
                <!-- Imagem do Item -->
                <img src="img/image.png" alt="paris">
                <!-- Overlay: camada de texto sobre a imagem -->
                <div class="orveley">Paris</div>
            </div>

            <!-- Item 2 -->
            <div class="item">
                <img src="img/australia.jpg" alt="australia">
                <div class="orveley">Australia</div>    
            </div>

            <!-- Item 3 -->
            <div class="item">
                <img src="img/brasil.jpg" alt="brasil">
                <div class="orveley">Brasil</div>   
            </div>

            <!-- Item 4 -->
            <div class="item">
                <img src="img/china.jpg" alt="china">
                <div class="orveley">China</div>   
            </div>

            <!-- Item 5 -->
            <div class="item">
                <img src="img/japao.jpg" alt="japao">
                <div class="orveley">Japão</div>
            </div>

            <!-- Item 6 -->
            <div class="item">
                <img src="img/plaza-uruguai.jpg" alt="uruguai">
                <div class="orveley">Uruguai</div>  
            </div>

        </div>

    </div>
</body>
</html>
