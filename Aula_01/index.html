<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- atalho para comentario ctrl + ; -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 - Página de Boas Vindas</title>
    <!-- Link que liga a página html ao arquivo css e aplica os estilos visuais -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- Cabeçalho da Pagina (Header)-->
    <!-- Seção Semântica usada para títulos principais e contéudo do topo -->
    <header>
        <!-- Título Principal (h1) que deve haver apenas um por página -->
        <h1>Bem-Vindos ao Nosso Curso!</h1>
    </header>
    <!-- Conteúdo Principal(Main) -->
    <!-- Seção semântica para o conteúdo principal da página  -->

     <main>
        <!-- Imagem precisa seguir um caminho, atalho / -->
         <!-- Alt é o texto alternativo -->
        <img src="/Aula_01/img/cartoes-menssagens-boas-vindas-primeira-semana-de-aula-volta-as-aulas (2).jpg" alt="Imagem de Boas Vindas">
        <!-- Parágrafo de introdução -->
        <p>Estamos muito felizes em ter você aqui.
         Prepare-se para mergulhar no mundo do desenvolvimento web!</p>
        
        <!-- (a) é para colocar link/arquivo; href é o caminho -->
        <a class="button" href="#">Começar agora</a>
     </main>

     <!-- Rodapé da página -->
      <!-- Seção semântica para informações de rodapé (copyright, links, etc) -->
      <footer>
        <p>&copy; 2026 Desenvolvedor Web Front-End</p>
      </footer>
</body>
</html>
